name: reproduce

on:
  push:
  pull_request:

jobs:
  test-and-reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-lock.txt
      - run: python run_tests.py
      - run: PYTHONPATH=src python -m energy_pile_screening.pipeline
      - run: python validate_reproduction.py
